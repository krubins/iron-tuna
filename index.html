      const { t, d } = JSON.parse(cached);

    }

  if (!res.ok) throw new Error(`Sleeper players ${res.status}`);
  const all = await res.json();
  const trim = {};
  for (const [id, p] of Object.entries(all)) {
    if (!p || !FANTASY_POSITIONS.has(p.position)) continue;
    trim[id] = {
      full_name: p.full_name,
      first_name: p.first_name,
      last_name: p.last_name,
      position: p.position,
      team: p.team,
      active: p.active,
      status: p.status,
      age: p.age,
      years_exp: p.years_exp,
      injury_status: p.injury_status,

  }

function buildRosterSlots(team, config, valuedPlayers) {
  const playerMap = new Map();
  valuedPlayers.forEach(p => playerMap.set(p.id, p));
  const byPos = {};
  team.roster.forEach(r => { byPos[r.position] = byPos[r.position] || []; byPos[r.position].push(r); });
  Object.values(byPos).forEach(arr => arr.sort((a, b) => b.price - a.price));
  const slots = [];
  for (const [pos, cfg] of Object.entries(config.roster)) {
    for (let i = 0; i < cfg.total; i++) {
      const drafted = byPos[pos]?.[i];
      slots.push({ label: cfg.total > 1 ? `${pos}${i + 1}` : pos, position: pos, filled: !!drafted, playerName: drafted ? playerMap.get(drafted.playerId)?.name : null, price: drafted?.price || 0 });
    }
  }
  return slots;
}

// Cost color for a purchased player: white within $1 of Value, blending toward red
// (overpay) or green (bargain) and getting more saturated the larger the gap.
function costColor(price, value) {
  if (value == null) return undefined;
  const d = price - value;
  if (d === 0) return 'var(--text-primary)';
  // Tint immediately: a couple dollars off reads as a faint tint, ~$10+ off is full color.
  const t = Math.min(1, Math.abs(d) / 10);
  const neutral = [245, 247, 250];
  const target = d > 0 ? [239, 68, 68] : [45, 212, 163];
  const mix = neutral.map((n, i) => Math.round(n + (target[i] - n) * t));
  return `rgb(${mix[0]}, ${mix[1]}, ${mix[2]})`;
}

function buildTiers(players, position) {
  const list = players.filter(p => p.position === position && p.projectedPoints > 0).sort((a, b) => b.projectedPoints - a.projectedPoints).slice(0, 60);
  if (list.length === 0) return [];
  const tiers = [];
  let currentTier = [list[0]];
  const gaps = [];
  for (let i = 1; i < list.length; i++) {
    const gap = list[i - 1].projectedPoints - list[i].projectedPoints;
    gaps.push(gap);
    const recentGaps = gaps.slice(-5);
    const avgGap = recentGaps.reduce((s, g) => s + g, 0) / recentGaps.length;
    const pctDrop = gap / Math.max(1, list[i - 1].projectedPoints);
    if ((avgGap > 0 && gap > avgGap * 1.8 && currentTier.length >= 1) || (pctDrop > 0.045 && currentTier.length >= 2)) {
      tiers.push({ minPoints: currentTier[currentTier.length - 1].projectedPoints, maxPoints: currentTier[0].projectedPoints, players: currentTier });
      currentTier = [];
    }
    currentTier.push(list[i]);
    if (currentTier.length >= 6) {
      tiers.push({ minPoints: currentTier[currentTier.length - 1].projectedPoints, maxPoints: currentTier[0].projectedPoints, players: currentTier });
      currentTier = [];
    }
  }
  if (currentTier.length > 0) tiers.push({ minPoints: currentTier[currentTier.length - 1].projectedPoints, maxPoints: currentTier[0].projectedPoints, players: currentTier });
  return tiers;
}

function PrepInsights({ players, config, seasonGames }) {
  const games = seasonGames || 17;
  const teams = (config && config.teams) || 12;
  const byPos = {};
  (players || []).forEach(p => (byPos[p.position] = byPos[p.position] || []).push(p));
  Object.values(byPos).forEach(a => a.sort((x, y) => (y.projectedPoints || 0) - (x.projectedPoints || 0)));
  const eff = ['QB', 'RB', 'WR', 'TE'].map(pos => {
    const starters = (config.roster[pos] && config.roster[pos].starters) || 1;
    const n = Math.max(1, Math.round(teams * starters));
    const top = (byPos[pos] || []).slice(0, n);
    const dollars = top.reduce((s, p) => s + (p.auctionValue || 0), 0);
    const pts = top.reduce((s, p) => s + Math.max(0, (p.vorp || 0) / games), 0);
    return { pos, perPoint: pts > 0.5 ? dollars / pts : 0 };
  }).filter(e => e.perPoint > 0);
  const maxPer = Math.max(1, ...eff.map(e => e.perPoint));
  const sorted = eff.slice().sort((a, b) => b.perPoint - a.perPoint);
  const priced = (players || []).filter(p => p.marketValue != null && p.auctionValue != null && (p.auctionValue >= 2 || p.marketValue >= 2)).map(p => ({ p, cost: p.marketValue, val: p.auctionValue, gap: p.marketValue - p.auctionValue }));
  const bargains = priced.filter(g => g.gap <= -3).sort((a, b) => a.gap - b.gap).slice(0, 5);
  const traps = priced.filter(g => g.gap >= 3).sort((a, b) => b.gap - a.gap).slice(0, 5);
  const TRAITS = {
    QB:  { inj: 'Low–moderate', cons: 'High',    note: 'Pocket passers are durable; rushing QBs carry more risk. Only one starts, so an injury is roster-defining. Established starters are among the most predictable year to year.' },
    RB:  { inj: 'Highest',      cons: 'Lowest',  note: 'Heavy workload plus contact, the most injury-prone starter with the shortest shelf life, and the most volatile production season to season.' },
    WR:  { inj: 'Moderate',     cons: 'High',    note: 'Soft-tissue (hamstring) injuries happen, but careers run longer and roles are stickier. Target share carries over, the most stable skill position year to year.' },
    TE:  { inj: 'Moderate',     cons: 'Streaky', note: 'A physical role with fewer touches than RB. Only the elite tier is reliable; there is a steep cliff after the top few.' },
    K:   { inj: 'Negligible',   cons: 'Random',  note: 'Rarely an injury factor, and essentially noise year to year. Never pay up, always stream.' },
    DEF: { inj: 'Negligible',   cons: 'Random',  note: 'Rarely an injury factor, and nearly impossible to predict. Stream on weekly matchups rather than paying up.' },
  };
  return (
    <div className="insights">
      <div className="ins-section">
        <h3 className="ins-h">Cost per point above replacement</h3>
        <p className="ins-sub">Auction dollars each starting tier costs per projected point over a replacement-level starter (per game). Higher means you are paying more for the same edge.</p>
        {sorted.map(e => (
          <div key={e.pos} className="ins-bar-row">
            <span className={`position-tag ${e.pos}`}>{e.pos}</span>
            <div className="ins-bar-track"><div className="ins-bar-fill" style={{ width: `${Math.max(5, (e.perPoint / maxPer) * 100)}%` }} /></div>
            <span className="ins-bar-val">${e.perPoint.toFixed(1)}/pt</span>
          </div>
        ))}
        <div className="ins-callout">The deepest positions, QB and elite TE, cost the most per point above replacement, because the gap from the top option to a streamer is small, so dollars spent there buy little real edge. Don't punt QB entirely (you still need a steady starter): pay the minimum for a reliable top-10 arm, then pour the savings into RB and WR, where each dollar buys a bigger edge.</div>
      </div>
      <div className="ins-section">
        <h3 className="ins-h">Injury risk &amp; year-to-year consistency</h3>
        <p className="ins-sub">How durable and how predictable each position tends to be, which is where your dollars are safest versus where you are buying upside and risk.</p>
        <div className="ins-table">
          <div className="ins-tr ins-thead"><span>Pos</span><span>Injury risk</span><span>Consistency</span><span>What it means</span></div>
          {['RB', 'WR', 'QB', 'TE', 'DEF', 'K'].map(pos => (
            <div key={pos} className="ins-tr">
              <span className={`position-tag ${pos}`}>{pos}</span>
              <span>{TRAITS[pos].inj}</span>
              <span>{TRAITS[pos].cons}</span>
              <span className="ins-note">{TRAITS[pos].note}</span>
            </div>
          ))}
        </div>
        <div className="ins-callout">Spend like it: anchor on durable, predictable production (top WRs and an elite QB/TE), and treat RB as high-upside but fragile, build depth there rather than betting everything on one back. Never pay up for K or DEF; they are effectively random and free to stream.</div>
      </div>
      <div className="ins-section">
        <h3 className="ins-h">Anticipated price vs. true value</h3>
        <p className="ins-sub">Where the room is likely to overpay (predicted cost above value) and where bargains hide (value above predicted cost). Plan to pounce on the bargains and let rivals overpay for the traps.</p>
        <div className="ins-twocol">
          <div>
            <div className="ins-coltitle good">Bargains, target these</div>
            {bargains.length ? bargains.map(g => (<div key={g.p.id} className="ins-pl-row"><span className={`position-tag ${g.p.position}`}>{g.p.position}</span><span className="ins-pl-name">{g.p.name}</span><span className="ins-pl-gap good">${g.cost} cost · ${g.val} value</span></div>)) : <div className="ins-empty">No clear bargains in the current pool.</div>}
          </div>
          <div>
            <div className="ins-coltitle bad">Traps, let rivals pay</div>
            {traps.length ? traps.map(g => (<div key={g.p.id} className="ins-pl-row"><span className={`position-tag ${g.p.position}`}>{g.p.position}</span><span className="ins-pl-name">{g.p.name}</span><span className="ins-pl-gap bad">${g.cost} cost · ${g.val} value</span></div>)) : <div className="ins-empty">No clear traps in the current pool.</div>}
          </div>
        </div>
        <div className="ins-callout">How to handle it: nominate the traps early, while wallets are full, let a rival burn budget on the name. Keep your powder dry for the bargains in the middle rounds, when the room is tapped out and value goes cheap. Your live max for each is the You column on the cheatsheet (with the strategy slider).</div>
      </div>
    </div>
  );
}

function formatStats(stats) {

  if (stats.rushYd) parts.push(`${stats.rushYd} rY`);
  if (stats.rushTD) parts.push(`${stats.rushTD} rTD`);
  if (stats.recYd) parts.push(`${stats.recYd} reY`);
  if (stats.recTD) parts.push(`${stats.recTD} reTD`);
  if (stats.rec) parts.push(`${stats.rec} rec`);
  if (stats.fgMade) parts.push(`${stats.fgMade} FG`);
  if (stats.sacks) parts.push(`${stats.sacks} sk`);
  if (stats.ints) parts.push(`${stats.ints} INT`);
  if (stats.ptsAllowed) parts.push(`${stats.ptsAllowed} PA`);
  return parts.join(' · ');
}

      <svg width="0" height="0" style={{ position: 'absolute' }} aria-hidden="true"><filter id="waterDistort" x="-14%" y="-14%" width="128%" height="128%"><feTurbulence type="fractalNoise" baseFrequency="0.018 0.028" numOctaves="2" seed="7" result="noise"><animate attributeName="baseFrequency" dur="13s" values="0.016 0.024;0.022 0.032;0.016 0.024" repeatCount="indefinite" /></feTurbulence><feDisplacementMap in="SourceGraphic" in2="noise" scale="2.5" xChannelSelector="R" yChannelSelector="G" /></filter></svg>
      {showSplash && <LandingSplash onDismiss={dismissSplash} onNav={handleLandingNav} />}
      <Header view={view} setView={setView} onUndo={handleUndo} onReset={handleReset} canUndo={draftHistory.length > 0} pointsMode={pointsMode} setPointsMode={setPointsMode} dataInfo={dataInfo} account={account} onUpgrade={() => { ITAnalytics.track('upgrade_click', {}); setOverlay('pricing'); }} onAccount={() => setOverlay('auth')} onToggleTest={toggleTestMode} onHome={() => setShowSplash(true)} />
      <div className={`main ${view === 'prep' ? 'prep-main' : ''} ${view === 'board' ? 'board-main' : ''} ${view === 'board' && !sidebarOpen ? 'board-collapsed' : ''}`}>
        <div className="main-content">{renderMainContent()}</div>
        <ModelsPanel myTeam={myTeam} players={personalizedPlayers} config={config} draftedIds={draftedIds} roleOverrides={roleOverrides} seasonGames={SEASON_GAMES} model={draftModel} onSelectModel={setDraftModel} targets={targets} mode={view === 'board' ? 'board' : 'prep'} teams={teams} marketState={marketState} />
      </div>
      {view === 'settings' && (
        <SettingsModal config={config} onSave={handleConfigChange} onClose={() => setView('board')} onImportProjections={handleProjectionsImport}
          onLoadLive={handleLoadLiveData} loading={loading} dataInfo={dataInfo} />
      )}
      {!showSplash && <ValueCoach valueAdjust={valueAdjust} onApply={setValueAdjust} config={config} players={baseValued} teamsCount={teams.length} locked={!has('coach')} onUnlock={() => openCheckout(TIERS.find(t => t.id === 'coach'))} evalPlayers={personalizedPlayers} myTeam={myTeam} teams={teams} draftedIds={draftedIds} seasonGames={SEASON_GAMES} onNominate={setCurrentNomination} plan={plan} marketState={marketState} name={view === 'board' ? 'Gameday Navigator' : 'Value Coach'} big={false} ai={account.ai} onSaveAi={(nai) => setAccount(a => ({ ...a, ai: nai }))} />}
      {assignPlayer && <QuickDraftModal player={assignPlayer} teams={teams} config={config} onConfirm={(teamId, price) => { handleDraft(assignPlayer.id, teamId, price); setAssignPlayer(null); }} onClose={() => setAssignPlayer(null)} />}
      {showAddPlayer && <AddPlayerModal onAdd={(name, pos, team) => { const np = handleAddPlayer(name, pos, team); setShowAddPlayer(false); setAssignPlayer(np); }} onClose={() => setShowAddPlayer(false)} />}
      {purchaseToast && <div className={`purchase-toast no-print tone-${purchaseToast.tone}`} onClick={() => setPurchaseToast(null)} title="Click to dismiss">{purchaseToast.text}</div>}
      {overlay === 'pricing' && <PricingModal account={account} onBuy={openCheckout} onClose={() => setOverlay(null)} onLegal={() => setOverlay('legal')} />}
      {overlay === 'auth' && <AuthModal account={account} onSignIn={handleSignIn} onSignOut={handleSignOut} onClose={() => setOverlay(null)} />}
      {overlay === 'legal' && <LegalModal onClose={() => setOverlay(null)} />}
      {overlay === 'share' && <ShareModal text={shareText} onClose={() => setOverlay(null)} />}
      {taunt && (
        <div className="modal-bg" onClick={() => setTaunt(null)}>
          <div className="modal taunt-modal" onClick={e => e.stopPropagation()}>
            <button className="modal-close" onClick={() => setTaunt(null)}>×</button>
            <div className="taunt-head">🔥 Live Mock</div>
            {taunt.name ? <div className="taunt-target">Now roasting: <b style={{ color: 'var(--text-secondary)' }}>{taunt.name}</b></div> : <div className="taunt-target" />}
            {teams.filter(t => !t.isMine).length > 0 && (
              <div className="taunt-pick"><label>Pick a team</label><select value={(teams.find(t => t.name === taunt.name) || {}).id || ''} onChange={e => { const t = teams.find(x => x.id === e.target.value); if (t) tauntTeam(t); }}>{!taunt.name && <option value="">–</option>}{teams.filter(t => !t.isMine).map(t => <option key={t.id} value={t.id}>{t.name}</option>)}</select></div>
            )}
            <div className="taunt-text">“{taunt.text}”</div>
            <div className="taunt-actions"><button className="btn-draft" onClick={makeTaunt}>Roast another rival</button><button className="btn-secondary" onClick={() => { try { navigator.clipboard && navigator.clipboard.writeText(taunt.text); } catch (e) {} }}>Copy</button></div>
          </div>
        </div>
      )}
      {overlay && overlay.checkout && <CheckoutModal tier={overlay.checkout} testMode={account.testMode} onComplete={() => { grantEntitlement(overlay.checkout.id); setOverlay('pricing'); }} onClose={() => setOverlay(null)} />}
      {!showSplash && !account.onboardingDismissed && draftHistory.length === 0 && <OnboardingChecklist steps={onbSteps} onDismiss={() => setAccount(a => ({ ...a, onboardingDismissed: true }))} />}
    </div>
  );
}
    try {
      const manifest = { name: 'Iron Tuna', short_name: 'Iron Tuna', start_url: '.', display: 'standalone', background_color: '#0a0a0a', theme_color: '#0a0a0a', description: 'Fantasy football auction draft assistant', icons: [] };
      const blob = new Blob([JSON.stringify(manifest)], { type: 'application/manifest+json' });
      const link = document.createElement('link'); link.rel = 'manifest'; link.href = URL.createObjectURL(blob); document.head.appendChild(link);
    } catch (e) {}
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<ErrorBoundary><App /></ErrorBoundary>);
  </script>
</body>
</html>
