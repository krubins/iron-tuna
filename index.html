  for (const [id, p] of Object.entries(all)) {
    if (!p || !FANTASY_POSITIONS.has(p.position)) continue;
    trim[id] = {
      full_name: p.full_name,
      first_name: p.first_name,
      last_name: p.last_name,
      position: p.position,
      team: p.team,
      active: p.active,
      status: p.status,
      age: p.age,
      years_exp: p.years_exp,
      injury_status: p.injury_status,

    const team = m.team || row.team || 'FA';

function buildRosterSlots(team, config, valuedPlayers) {
  const playerMap = new Map();
  valuedPlayers.forEach(p => playerMap.set(p.id, p));
  const byPos = {};
  team.roster.forEach(r => { byPos[r.position] = byPos[r.position] || []; byPos[r.position].push(r); });
  Object.values(byPos).forEach(arr => arr.sort((a, b) => b.price - a.price));
  const slots = [];
  for (const [pos, cfg] of Object.entries(config.roster)) {
    for (let i = 0; i < cfg.total; i++) {
      const drafted = byPos[pos]?.[i];
      slots.push({ label: cfg.total > 1 ? `${pos}${i + 1}` : pos, position: pos, filled: !!drafted, playerName: drafted ? playerMap.get(drafted.playerId)?.name : null, price: drafted?.price || 0 });
    }
  }
  return slots;
}

// Optimal-lineup planner. Maximizes the projected points of your STARTING

// you are still required to fill. Produces concrete per-slot target prices
// ("you need a ~$27 RB next") and a per-player "plan max" used by the bid panel.
function starterSlotDefs(config) {

    for (let i = 0; i < c.starters; i++) {
      defs.push({ label: c.starters > 1 ? `${pos}${i + 1}` : pos, eligible: [pos], basePos: pos });
    }
  });
  const fc = config.flex?.count || 0;
  for (let i = 0; i < fc; i++) {
    defs.push({ label: fc > 1 ? `FLEX${i + 1}` : 'FLEX', eligible: [...(config.flex.eligible || [])], basePos: 'FLEX' });
  }

// Assign the players you have ALREADY drafted to your best starting slots.
function assignDraftedToStarters(myPlayers, config, roleOverrides) {
  roleOverrides = roleOverrides || {};
  const roleRank = id => { const r = roleOverrides[id]; return r === 'starter' ? 0 : r === 'reserve' ? 2 : 1; };
  const startable = p => roleOverrides[p.id] !== 'reserve';
  const byPos = {};
  myPlayers.forEach(p => (byPos[p.position] = byPos[p.position] || []).push(p));
  Object.values(byPos).forEach(a => a.sort((x, y) => { const rr = roleRank(x.id) - roleRank(y.id); return rr !== 0 ? rr : (y.projectedPoints - x.projectedPoints); }));
  const used = new Set();
  const filled = {};
  Object.entries(config.roster).forEach(([pos, c]) => {
    for (let i = 0; i < c.starters; i++) {
      const label = c.starters > 1 ? `${pos}${i + 1}` : pos;
      const cand = (byPos[pos] || []).find(p => !used.has(p.id) && startable(p));
      if (cand) { used.add(cand.id); filled[label] = cand; }
    }
  });
  const flexElig = config.flex?.eligible || [];
  const fc = config.flex?.count || 0;
  for (let i = 0; i < fc; i++) {
    let best = null;
    flexElig.forEach(pos => (byPos[pos] || []).forEach(p => {
      if (used.has(p.id) || !startable(p)) return;
      if (!best || roleRank(p.id) < roleRank(best.id) || (roleRank(p.id) === roleRank(best.id) && p.projectedPoints > best.projectedPoints)) best = p;

// ─── Snake draft simulator — the sequential analog of buildOptimalPlan. ─────────
// Simulates the rest of a snake draft from config.snake.draftSlot: at each of YOUR
// picks, take the available player that most increases your projected STARTING
// points (roster-legal via assignDraftedToStarters); at every other pick, the
// opponent model removes the lowest-ADP player still on the board.
function buildSnakePlan(myTeam, players, config, draftedIds, opts) {
  const valueBoost = (opts && opts.valueBoost) || null;

  const slot = (config.snake && config.snake.draftSlot) || 1;

  const pmap = new Map(players.map(p => [p.id, p]));
  const limits = {}; Object.entries(config.roster).forEach(([pos, c]) => { limits[pos] = c.total; });

  // overall pick -> drafting slot (snake serpentine)
  const slotAt = (o) => { const round = Math.ceil(o / T); const idx = ((o - 1) % T) + 1; return (round % 2 === 1) ? idx : (T - idx + 1); };
  const roundOf = (o) => Math.ceil(o / T);

  let myRoster = ((myTeam && myTeam.roster) || []).map(r => pmap.get(r.playerId)).filter(Boolean);
  const taken = new Set([...drafted]);
  // available, ordered by ADP (opponent model consumes the front of this list)
  const availByAdp = players.filter(p => !taken.has(p.id)).sort((a, b) => (a.adp || 999) - (b.adp || 999));

  const posCount = (roster, pos) => roster.reduce((n, p) => n + (p.position === pos ? 1 : 0), 0);
  const canAdd = (roster, pos) => posCount(roster, pos) < (limits[pos] || 0);

  const starterPointsOf = (roster) => { const { filled } = assignDraftedToStarters(roster, config, {}); return Object.values(filled).reduce((s, p) => s + (p.projectedPoints || 0), 0); };

  // Best pick for ME: maximize marginal starting points; tie-break by value;
  // fall back to best legal player by value once starters are full (bench rounds).
  const pickBestForMe = (roster) => {
    const cur = starterPointsOf(roster);
    const cands = availByAdp.filter(p => !taken.has(p.id) && canAdd(roster, p.position)).sort((a, b) => valOf(b) - valOf(a));
    const pool = cands.slice(0, 60);
    let best = null, bestScore = -Infinity;
    pool.forEach(p => {
      const boost = valueBoost ? valueBoost(p, roster) : 0;

      // secures scarce studs first (so we don't take a low-VORP QB1 first overall) yet still
      // fills required starter slots (QB/TE/K/DEF) at the right time instead of never.
      const startsImprove = starterPointsOf(roster.concat([p])) - cur;

    if (slotAt(o) === slot) {
      const pick = pickBestForMe(myRoster);
      if (pick) { taken.add(pick.id); myRoster = myRoster.concat([pick]); byRound.push({ round: roundOf(o), overall: o, player: pick }); if (recommendedNow == null) recommendedNow = pick; }
    } else {
      const opp = takeTopAdp();
      if (opp) taken.add(opp.id);
    }
  }

function switchPrice(player, baselinePoints, myTeam, players, config, draftedIds, roleOverrides, targets) {

  if (maxBid < minBid) return null;

      {view === 'settings' && (
        <SettingsModal config={config} onSave={handleConfigChange} onClose={() => setView('board')} onImportProjections={handleProjectionsImport}
          onLoadLive={handleLoadLiveData} loading={loading} dataInfo={dataInfo} />
      )}
      {assignPlayer && <QuickDraftModal player={assignPlayer} teams={teams} config={config} seasonGames={SEASON_GAMES} players={personalizedPlayers} myTeam={myTeam} onConfirm={(teamId, price) => { handleDraft(assignPlayer.id, teamId, price); setAssignPlayer(null); }} onClose={() => setAssignPlayer(null)} />}
      {!showSplash && (assignPlayer || currentNomination) && <ValueCoach valueAdjust={valueAdjust} onApply={setValueAdjust} config={config} players={baseValued} teamsCount={teams.length} locked={!has(liveTier)} onUnlock={() => promptUpgrade('the live Value Coach and bid guidance')} evalPlayers={personalizedPlayers} myTeam={myTeam} teams={teams} draftedIds={draftedIds} seasonGames={SEASON_GAMES} onNominate={setCurrentNomination} plan={plan} marketState={marketState} name="Value Coach" ai={account.ai} onSaveAi={(nai) => setAccount(a => ({ ...a, ai: nai }))} onBeforeAsk={coachGate} />}
      {showAddPlayer && <AddPlayerModal teams={teams} config={config} onAdd={(name, pos, nflTeam, teamId, price) => { handleAddDrafted(name, pos, nflTeam, teamId, price); setShowAddPlayer(false); }} onClose={() => setShowAddPlayer(false)} />}
      {purchaseToast && <div className={`purchase-toast no-print tone-${purchaseToast.tone}`} onClick={() => setPurchaseToast(null)} title="Click to dismiss">{purchaseToast.text}</div>}
      {overlay === 'pricing' && <PricingModal account={account} onBuy={openCheckout} onClose={() => setOverlay(null)} onLegal={() => setOverlay('legal')} highlightId={liveTier} />}
      {overlay === 'upgrade' && <UpgradeModal reason={upgradeReason} format={config.format} onUnlock={() => openCheckout(TIERS.find(t => t.id === liveTier))} onClose={() => setOverlay(null)} />}
      {overlay === 'auth' && <AuthModal account={account} onSignIn={handleSignIn} onSignOut={handleSignOut} onClose={() => { setAuthReason(''); setOverlay(null); }} reason={authReason} />}
      {overlay === 'legal' && <LegalModal onClose={() => setOverlay(null)} />}
      {overlay === 'share' && <ShareModal text={shareText} onClose={() => setOverlay(null)} />}
      {overlay && overlay.checkout && <CheckoutModal tier={overlay.checkout} testMode={account.testMode} onComplete={() => { grantEntitlement(overlay.checkout.id); setOverlay('pricing'); }} onClose={() => setOverlay(null)} />}
      {!showSplash && !account.onboardingDismissed && draftHistory.length === 0 && <OnboardingChecklist steps={onbSteps} onDismiss={() => setAccount(a => ({ ...a, onboardingDismissed: true }))} />}
    </div>
  );
}
    try {
      const manifest = { name: 'Iron Tuna', short_name: 'Iron Tuna', start_url: '.', display: 'standalone', background_color: '#0a0a0a', theme_color: '#0a0a0a', description: 'Fantasy football auction draft assistant', icons: [] };
      const blob = new Blob([JSON.stringify(manifest)], { type: 'application/manifest+json' });
      const link = document.createElement('link'); link.rel = 'manifest'; link.href = URL.createObjectURL(blob); document.head.appendChild(link);
    } catch (e) {}
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<ErrorBoundary><App /></ErrorBoundary>);
  </script>
</body>
</html>
